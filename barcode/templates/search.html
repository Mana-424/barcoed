{% extends "base.html" %}

{% block content %}

<h2>検索（13桁バーコード専用）</h2>

<input type="text"
       id="barcodeInput"
       placeholder="13桁の数字を入力"
       autofocus>

<hr>

{% if photo %}

<div class="search-card">

    <div class="search-card-inner">

        <!-- 左：情報 -->
        <div class="search-info">

            <h2>ID：{{ photo.id }}</h2>

            <p>商品名：{{ photo.name or "未設定" }}</p>

            <p>色：{{ photo.color or "未設定" }}</p>

            <p>総合検索回数：{{ total_count }}</p>

            <p>今日検索回数：{{ today_count }}</p>

        </div>

        <!-- 右：写真 -->
        <div class="search-image">

            <img src="{{ url_for('static', filename='uploads/' + photo.filename) }}">

        </div>

    </div>

</div>

{% endif %}

<script>
const input = document.getElementById("barcodeInput");

input.addEventListener("input", function(){

    this.value = this.value.replace(/[^0-9]/g,"");

    if(this.value.length === 13){
        window.location.href = "/search?keyword=" + this.value;
    }

});
</script>

{% endblock %}
