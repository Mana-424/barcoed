{% extends "base.html" %}

{% block content %}

<h2>カウント（13桁バーコード専用）</h2>

<input type="text"
       id="barcodeInput"
       placeholder="13桁の数字を入力"
       autofocus>

<hr>

{% if photo %}

<div class="search-card">

    <div class="search-card-inner">

        <!-- 左：情報 -->
       <div class="search-info">
       
           <div class="info-block">
               <div class="label">商品名</div>
               <div class="value">{{ photo.name or "未設定" }}</div>
           </div>
       
           <div class="info-block">
               <div class="label">色</div>
               <div class="value">{{ photo.color or "未設定" }}</div>
           </div>
       
           <div class="info-block">
               <div class="label">総合カウント回数</div>
               <div class="value">{{ total_count }}</div>
           </div>
       
           <div class="info-block">
               <div class="label">今日カウント回数</div>
               <div class="value">{{ today_count }}</div>
           </div>
       
       </div>
        <!-- 右：写真 -->
        <div class="search-image">

            <!-- <img src="{{ url_for('static', filename='uploads/' + photo.filename) }}"> -->
               <img src="{{ url_for('uploaded_file', filename=photo.filename) }}">
              <p>ID：{{ photo.id }}</p>
        </div>

    </div>

</div>

{% endif %}

<script>
const input = document.getElementById("barcodeInput");

if (input) {

    input.addEventListener("input", function(){

        this.value = this.value.replace(/[^0-9]/g,"");

        if(this.value.length === 13){
            window.location.href = "/search?keyword=" + this.value;
        }

    });

}

// ページ読み込み後に一番下へスクロール
window.onload = function() {
    window.scrollTo(0, document.body.scrollHeight);
};

</script>


{% endblock %}
